<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Stenvik Lead Pipeline{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">Stenvik · Lead Pipeline</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/">Дашборд</a></li>
          <li class="nav-item"><a class="nav-link" href="/leads">Все лиды</a></li>
          <li class="nav-item"><a class="nav-link" href="/leads?priority=5">Горячие</a></li>
          <li class="nav-item"><a class="nav-link" href="/leads?priority=4">Тёплые</a></li>
        </ul>
        <span class="navbar-text text-light">
          <span class="me-2">👤 {{ user }}</span>
        </span>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
