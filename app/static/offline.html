<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Нет связи — Stenvik Leads</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6fa;
    color: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 32px;
    border-radius: 16px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(15,23,42,0.1);
  }
  .icon { font-size: 48px; margin-bottom: 12px; }
  h1 { margin: 0 0 8px; font-size: 22px; }
  p { color: #64748b; line-height: 1.5; }
  button {
    margin-top: 20px;
    padding: 12px 24px;
    background: #1f2937;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Нет связи</h1>
    <p>Приложение не может достучаться до сервера. Это нормально, если ты в лифте
       или метро — как только связь вернётся, страница откроется сама.</p>
    <button onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
